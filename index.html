<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mohammed Ali - Frontend Developer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1B3A5C, #2196F3);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 50px 60px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { font-size: 2.5rem; margin-bottom: 10px; }
    p { font-size: 1.2rem; opacity: 0.85; margin-bottom: 30px; }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border-radius: 30px;
      padding: 8px 20px;
      margin: 5px;
      font-size: 0.9rem;
    }
    .footer { margin-top: 40px; font-size: 0.85rem; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Mohammed Ali Almaliky</h1>
    <p>Frontend Developer | Vue.js · Nuxt.js · TypeScript</p>
    <div>
      <span class="badge">Vue.js</span>
      <span class="badge">Nuxt.js</span>
      <span class="badge">TypeScript</span>
      <span class="badge">TailwindCSS</span>
      <span class="badge">Node.js</span>
    </div>
    <div class="footer">Iraq, Karbala · github.com/mhmdali98</div>
  </div>
</body>
</html>
